# ════════════════════════════════════════════════════
#  fly.toml — Fleet Network Intelligence
#  Deploy no fly.io  |  Região: gru (São Paulo)
#
#  Arquitetura:
#    nginx :80  →  proxy reverso
#      /api/*  →  FastAPI  :8000
#      /*      →  Streamlit :8501
# ════════════════════════════════════════════════════

app            = "estudo-de-rede-profrotas"
primary_region = "gru"

[build]

[env]
  PORT          = "80"
  API_PORT      = "8000"
  ST_PORT       = "8501"
  # JWT_SECRET, API_USER, API_PASS, SUPABASE_URL, SUPABASE_KEY
  # → defina como secrets: fly secrets set JWT_SECRET=... API_PASS=...

[http_service]
  internal_port        = 80
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 30
    soft_limit = 25

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1
