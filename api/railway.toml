[build]
builder = "NIXPACKS"

[deploy]
startCommand = "pip install fastapi python-jose[cryptography] passlib[bcrypt] python-multipart httpx --break-system-packages -q && uvicorn api_server:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
