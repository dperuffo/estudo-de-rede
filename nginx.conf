# ═══════════════════════════════════════════════════════
#  Fleet Network Intelligence — Nginx Proxy Reverso
#  /api/*  →  FastAPI  127.0.0.1:8000
#  /*      →  Streamlit 127.0.0.1:8501
# ═══════════════════════════════════════════════════════

worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout 65;

    # ── Limite de tamanho de upload (planilhas)
    client_max_body_size 50M;

    # ── Timeouts generosos para Streamlit WebSocket
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;
    proxy_connect_timeout 10s;

    upstream streamlit {
        server 127.0.0.1:8501;
    }

    upstream fastapi {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name _;

        # ── API → FastAPI ─────────────────────────────────
        location /api {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # CORS — FastAPI já adiciona, mas garantimos aqui
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── WebSocket do Streamlit ─────────────────────────
        location /_stcore/stream {
            proxy_pass         http://streamlit;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # ── Tudo mais → Streamlit ─────────────────────────
        location / {
            proxy_pass         http://streamlit;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $http_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
        }
    }
}
